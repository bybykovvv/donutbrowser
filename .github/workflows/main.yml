name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: ./src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm exec next build

      - name: Build sidecar
        working-directory: ./src-tauri
        run: cargo build --bin donut-proxy --target x86_64-pc-windows-msvc --release

      - name: Build Tauri app
        working-directory: ./src-tauri
        run: cargo tauri build --target x86_64-pc-windows-msvc --no-bundle

      - name: Create portable ZIP
        shell: bash
        run: |
          mkdir -p Donut-Portable
          cp src-tauri/target/x86_64-pc-windows-msvc/release/donutbrowser.exe Donut-Portable/Donut.exe
          cp src-tauri/target/x86_64-pc-windows-msvc/release/donut-proxy.exe Donut-Portable/
          [ -f src-tauri/target/x86_64-pc-windows-msvc/release/WebView2Loader.dll ] && \
            cp src-tauri/target/x86_64-pc-windows-msvc/release/WebView2Loader.dll Donut-Portable/
          touch Donut-Portable/.portable
          7z a Donut-Portable.zip Donut-Portable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Donut-Portable
          path: Donut-Portable.zip
